<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" fill="none">
  <defs>
    <!-- Brand colors -->
    <linearGradient id="grad_pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#BE1869"/>
      <stop offset="100%" stop-color="#88064B"/>
    </linearGradient>
    <linearGradient id="grad_blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0779D6"/>
      <stop offset="100%" stop-color="#055DA6"/>
    </linearGradient>
    <linearGradient id="grad_teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1CA398"/>
      <stop offset="100%" stop-color="#148F85"/>
    </linearGradient>
    <linearGradient id="grad_yellow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F6BD1A"/>
      <stop offset="100%" stop-color="#D4A216"/>
    </linearGradient>
    <linearGradient id="grad_purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6224BE"/>
      <stop offset="100%" stop-color="#4A1B90"/>
    </linearGradient>
    <!-- Pillar gradient -->
    <linearGradient id="pillar_shade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A3D42"/>
      <stop offset="100%" stop-color="#23262A"/>
    </linearGradient>
  </defs>

  <!-- ════════════════════════════════════════════════════════
       TRACK BASE — main structural lines and ramps
       ════════════════════════════════════════════════════════ -->
  <g id="track_base">
    <!-- Bottom ramp platform (isometric) -->
    <polygon points="100,920 400,750 700,920 400,1090" fill="#2A2D32" stroke="#23262A" stroke-width="2"/>
    <polygon points="100,920 400,750 700,920 400,850" fill="#32363B" stroke="#23262A" stroke-width="1.5" opacity="0.6"/>

    <!-- Left ascending ramp -->
    <polygon points="120,900 200,855 220,865 140,910" fill="#32363B" stroke="#3A3D42" stroke-width="1.5"/>
    <polygon points="140,880 220,835 240,845 160,890" fill="#32363B" stroke="#3A3D42" stroke-width="1.5"/>
    <polygon points="160,860 240,815 260,825 180,870" fill="#32363B" stroke="#3A3D42" stroke-width="1.5"/>

    <!-- Central zigzag ramp structure -->
    <!-- Ramp segment 1 (bottom-left to right) -->
    <polygon points="180,830 380,710 400,720 200,840" fill="#2E3136" stroke="#3A3D42" stroke-width="1.5"/>
    <line x1="180" y1="830" x2="200" y2="840" stroke="#3A3D42" stroke-width="1"/>
    <line x1="380" y1="710" x2="400" y2="720" stroke="#3A3D42" stroke-width="1"/>

    <!-- Ramp segment 2 (right to left) -->
    <polygon points="400,700 600,580 620,590 420,710" fill="#2E3136" stroke="#3A3D42" stroke-width="1.5"/>

    <!-- Ramp segment 3 (left to right, middle) -->
    <polygon points="200,580 420,460 440,470 220,590" fill="#2E3136" stroke="#3A3D42" stroke-width="1.5"/>

    <!-- Ramp segment 4 (right to center-top) -->
    <polygon points="440,440 620,330 640,340 460,450" fill="#2E3136" stroke="#3A3D42" stroke-width="1.5"/>

    <!-- Upper platform connecting to gear -->
    <polygon points="500,300 640,220 700,255 560,335" fill="#2E3136" stroke="#3A3D42" stroke-width="1.5"/>

    <!-- Support pillars (isometric cylinders) -->
    <!-- Pillar 1 -->
    <ellipse cx="230" cy="840" rx="18" ry="10" fill="#2A2D32" stroke="#3A3D42" stroke-width="1"/>
    <rect x="212" y="780" width="36" height="60" fill="url(#pillar_shade)" stroke="#3A3D42" stroke-width="1"/>
    <ellipse cx="230" cy="780" rx="18" ry="10" fill="#32363B" stroke="#3A3D42" stroke-width="1"/>

    <!-- Pillar 2 -->
    <ellipse cx="370" cy="720" rx="18" ry="10" fill="#2A2D32" stroke="#3A3D42" stroke-width="1"/>
    <rect x="352" y="650" width="36" height="70" fill="url(#pillar_shade)" stroke="#3A3D42" stroke-width="1"/>
    <ellipse cx="370" cy="650" rx="18" ry="10" fill="#32363B" stroke="#3A3D42" stroke-width="1"/>

    <!-- Pillar 3 -->
    <ellipse cx="580" cy="590" rx="18" ry="10" fill="#2A2D32" stroke="#3A3D42" stroke-width="1"/>
    <rect x="562" y="490" width="36" height="100" fill="url(#pillar_shade)" stroke="#3A3D42" stroke-width="1"/>
    <ellipse cx="580" cy="490" rx="18" ry="10" fill="#32363B" stroke="#3A3D42" stroke-width="1"/>

    <!-- Pillar 4 -->
    <ellipse cx="280" cy="590" rx="18" ry="10" fill="#2A2D32" stroke="#3A3D42" stroke-width="1"/>
    <rect x="262" y="500" width="36" height="90" fill="url(#pillar_shade)" stroke="#3A3D42" stroke-width="1"/>
    <ellipse cx="280" cy="500" rx="18" ry="10" fill="#32363B" stroke="#3A3D42" stroke-width="1"/>

    <!-- Pillar 5 -->
    <ellipse cx="610" cy="340" rx="18" ry="10" fill="#2A2D32" stroke="#3A3D42" stroke-width="1"/>
    <rect x="592" y="260" width="36" height="80" fill="url(#pillar_shade)" stroke="#3A3D42" stroke-width="1"/>
    <ellipse cx="610" cy="260" rx="18" ry="10" fill="#32363B" stroke="#3A3D42" stroke-width="1"/>

    <!-- Guard rails (subtle lines along ramps) -->
    <polyline points="180,825 380,705" fill="none" stroke="#444" stroke-width="0.8" stroke-dasharray="4,4"/>
    <polyline points="200,835 400,715" fill="none" stroke="#444" stroke-width="0.8" stroke-dasharray="4,4"/>
    <polyline points="400,695 600,575" fill="none" stroke="#444" stroke-width="0.8" stroke-dasharray="4,4"/>
    <polyline points="420,705 620,585" fill="none" stroke="#444" stroke-width="0.8" stroke-dasharray="4,4"/>
    <polyline points="200,575 420,455" fill="none" stroke="#444" stroke-width="0.8" stroke-dasharray="4,4"/>
    <polyline points="220,585 440,465" fill="none" stroke="#444" stroke-width="0.8" stroke-dasharray="4,4"/>
    <polyline points="440,435 620,325" fill="none" stroke="#444" stroke-width="0.8" stroke-dasharray="4,4"/>
    <polyline points="460,445 640,335" fill="none" stroke="#444" stroke-width="0.8" stroke-dasharray="4,4"/>

    <!-- Directional arrows on ramps (yellow) -->
    <polygon points="290,770 300,762 296,770 300,778" fill="#F6BD1A" opacity="0.7"/>
    <polygon points="500,640 510,632 506,640 510,648" fill="#F6BD1A" opacity="0.7"/>
    <polygon points="320,520 330,512 326,520 330,528" fill="#F6BD1A" opacity="0.7"/>
    <polygon points="540,380 550,372 546,380 550,388" fill="#F6BD1A" opacity="0.7"/>
  </g>

  <!-- ════════════════════════════════════════════════════════
       ZONE: MARKETING — lower section (blue tones)
       ════════════════════════════════════════════════════════ -->
  <g id="zone_marketing">
    <!-- Platform accent piece (isometric block) -->
    <polygon points="150,890 250,835 270,845 170,900" fill="url(#grad_blue)" opacity="0.25" stroke="#0779D6" stroke-width="1"/>
    <polygon points="350,760 450,705 470,715 370,770" fill="url(#grad_blue)" opacity="0.25" stroke="#0779D6" stroke-width="1"/>

    <!-- Connector pieces between ramps (blue tubes) -->
    <line x1="200" y1="840" x2="200" y2="830" stroke="#0779D6" stroke-width="3" stroke-linecap="round"/>
    <line x1="380" y1="710" x2="400" y2="700" stroke="#0779D6" stroke-width="3" stroke-linecap="round"/>

    <!-- Zone label background -->
    <rect x="220" y="870" width="90" height="24" rx="4" fill="#0779D6" opacity="0.12"/>
  </g>

  <!-- ════════════════════════════════════════════════════════
       ZONE: SALES — middle section (purple/pink tones)
       ════════════════════════════════════════════════════════ -->
  <g id="zone_sales">
    <!-- Platform accent pieces -->
    <polygon points="460,640 560,585 580,595 480,650" fill="url(#grad_pink)" opacity="0.2" stroke="#BE1869" stroke-width="1"/>
    <polygon points="250,540 350,485 370,495 270,550" fill="url(#grad_pink)" opacity="0.2" stroke="#BE1869" stroke-width="1"/>

    <!-- Connector pieces -->
    <line x1="600" y1="580" x2="620" y2="590" stroke="#BE1869" stroke-width="3" stroke-linecap="round"/>
    <line x1="420" y1="460" x2="440" y2="470" stroke="#BE1869" stroke-width="3" stroke-linecap="round"/>

    <!-- Isometric platform piece (pink, representing sales pipeline) -->
    <polygon points="480,520 540,485 560,495 500,530" fill="url(#grad_pink)" opacity="0.15"/>

    <!-- Zone label background -->
    <rect x="430" y="555" width="70" height="24" rx="4" fill="#BE1869" opacity="0.12"/>
  </g>

  <!-- ════════════════════════════════════════════════════════
       ZONE: SERVICE — upper section (teal tones)
       ════════════════════════════════════════════════════════ -->
  <g id="zone_service">
    <!-- Platform accent piece leading to gear -->
    <polygon points="520,320 600,280 620,290 540,330" fill="url(#grad_teal)" opacity="0.2" stroke="#1CA398" stroke-width="1"/>

    <!-- Connector to gear -->
    <line x1="640" y1="330" x2="650" y2="280" stroke="#1CA398" stroke-width="3" stroke-linecap="round"/>

    <!-- Zone label background -->
    <rect x="560" y="305" width="70" height="24" rx="4" fill="#1CA398" opacity="0.12"/>
  </g>

  <!-- ════════════════════════════════════════════════════════
       GEAR — mechanism at the top (the "engine")
       ════════════════════════════════════════════════════════ -->
  <g id="gear">
    <!-- Gear body (simplified isometric gear) -->
    <circle cx="680" cy="220" r="50" fill="none" stroke="#BE1869" stroke-width="2.5" opacity="0.6"/>
    <circle cx="680" cy="220" r="35" fill="none" stroke="#88064B" stroke-width="1.5" opacity="0.4"/>
    <circle cx="680" cy="220" r="12" fill="#BE1869" opacity="0.3"/>

    <!-- Gear teeth (12 teeth) -->
    <g stroke="#BE1869" stroke-width="2.5" opacity="0.5">
      <line x1="680" y1="168" x2="680" y2="178"/>
      <line x1="680" y1="262" x2="680" y2="272"/>
      <line x1="628" y1="220" x2="638" y2="220"/>
      <line x1="722" y1="220" x2="732" y2="220"/>
      <line x1="643" y1="183" x2="650" y2="190"/>
      <line x1="710" y1="250" x2="717" y2="257"/>
      <line x1="643" y1="257" x2="650" y2="250"/>
      <line x1="710" y1="190" x2="717" y2="183"/>
      <line x1="658" y1="173" x2="662" y2="181"/>
      <line x1="698" y1="259" x2="702" y2="267"/>
      <line x1="633" y1="198" x2="641" y2="202"/>
      <line x1="719" y1="238" x2="727" y2="242"/>
    </g>

    <!-- Inner mechanism details -->
    <polygon points="670,205 690,205 695,220 690,235 670,235 665,220" fill="none" stroke="#BE1869" stroke-width="1" opacity="0.4"/>

    <!-- Gear mounting plate -->
    <ellipse cx="680" cy="270" rx="30" ry="12" fill="#2A2D32" stroke="#3A3D42" stroke-width="1.5"/>
    <rect x="650" y="250" width="60" height="20" fill="url(#pillar_shade)" stroke="#3A3D42" stroke-width="1"/>
    <ellipse cx="680" cy="250" rx="30" ry="12" fill="#32363B" stroke="#3A3D42" stroke-width="1.5"/>
  </g>

  <!-- ════════════════════════════════════════════════════════
       START — entry point (bottom)
       ════════════════════════════════════════════════════════ -->
  <g id="start">
    <!-- Start platform -->
    <polygon points="80,940 160,895 180,905 100,950" fill="#0779D6" opacity="0.3" stroke="#0779D6" stroke-width="1.5"/>
    <polygon points="80,940 100,950 100,965 80,955" fill="#055DA6" opacity="0.3"/>
    <polygon points="100,950 180,905 180,920 100,965" fill="#0779D6" opacity="0.2"/>

    <!-- Start flag -->
    <line x1="120" y1="930" x2="120" y2="895" stroke="#0779D6" stroke-width="2"/>
    <polygon points="120,895 150,905 120,915" fill="#0779D6" opacity="0.6"/>
    <circle cx="120" cy="893" r="3" fill="#0779D6"/>

    <!-- "START" indicator -->
    <rect x="90" y="955" width="50" height="18" rx="3" fill="#0779D6" opacity="0.15"/>
  </g>

  <!-- ════════════════════════════════════════════════════════
       GOAL — finish point (top-right, after gear)
       ════════════════════════════════════════════════════════ -->
  <g id="goal">
    <!-- Finish platform -->
    <polygon points="700,160 760,128 780,138 720,170" fill="#1CA398" opacity="0.3" stroke="#1CA398" stroke-width="1.5"/>
    <polygon points="700,160 720,170 720,185 700,175" fill="#148F85" opacity="0.3"/>
    <polygon points="720,170 780,138 780,153 720,185" fill="#1CA398" opacity="0.2"/>

    <!-- Finish flag (checkered style) -->
    <line x1="740" y1="155" x2="740" y2="115" stroke="#1CA398" stroke-width="2"/>
    <rect x="740" y="115" width="20" height="14" fill="#1CA398" opacity="0.6"/>
    <rect x="740" y="115" width="10" height="7" fill="#148F85" opacity="0.8"/>
    <rect x="750" y="122" width="10" height="7" fill="#148F85" opacity="0.8"/>
    <circle cx="740" cy="113" r="3" fill="#1CA398"/>

    <!-- Trophy/star -->
    <polygon points="755,100 758,108 766,108 760,113 762,121 755,117 748,121 750,113 744,108 752,108" fill="#F6BD1A" opacity="0.5"/>
  </g>

  <!-- ════════════════════════════════════════════════════════
       HOTSPOT AREAS — transparent interactive zones
       ════════════════════════════════════════════════════════ -->
  <g id="hotspots">
    <rect id="hotspot_marketing" x="100" y="700" width="380" height="320" rx="8" fill="transparent" stroke="none"/>
    <rect id="hotspot_sales" x="200" y="430" width="440" height="280" rx="8" fill="transparent" stroke="none"/>
    <rect id="hotspot_service" x="440" y="150" width="360" height="290" rx="8" fill="transparent" stroke="none"/>
  </g>

  <!-- ════════════════════════════════════════════════════════
       MOTION PATH — hidden path for ball animation
       (follows the visual ramp from start to goal)
       ════════════════════════════════════════════════════════ -->
  <path id="ball_path"
    d="M 120,930
       L 190,835
       L 290,770
       L 390,710
       Q 400,705 410,700
       L 500,645
       L 600,585
       Q 610,580 600,575
       L 440,470
       L 310,520
       L 220,580
       Q 210,585 220,575
       L 330,510
       L 440,450
       L 540,390
       L 630,340
       Q 640,335 650,310
       L 660,280
       L 680,240
       L 700,200
       L 720,170
       L 740,150"
    fill="none" stroke="none" stroke-width="0"/>
</svg>
